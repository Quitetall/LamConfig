# =============================================================================
#  tmux.conf — Kanagawa Dragon theme
#  User: brianklam
# =============================================================================

# ---------------------------------------------------------------------------
#  General
# ---------------------------------------------------------------------------

# Remap prefix from C-b to C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Start windows and panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Scrollback buffer
set -g history-limit 50000

# Faster escape time (ms) — eliminates delay in vim/neovim
set -sg escape-time 10

# Faster key repeat
set -g repeat-time 300

# Focus events (needed by some editors)
set -g focus-events on

# Mouse support
set -g mouse on

# ---------------------------------------------------------------------------
#  True color support (Ghostty / modern terminals)
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-ghostty:RGB"
set -sa terminal-overrides ",xterm-256color:RGB"
set -sa terminal-overrides ",xterm-ghostty:RGB"

# ---------------------------------------------------------------------------
#  Key bindings
# ---------------------------------------------------------------------------

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Intuitive splits — open in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap windows left/right with Shift+Arrow
bind -r S-Left swap-window -t -1\; select-window -t -1
bind -r S-Right swap-window -t +1\; select-window -t +1

# ---------------------------------------------------------------------------
#  Copy mode — vi keys
# ---------------------------------------------------------------------------
setw -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send -X cancel

# ---------------------------------------------------------------------------
#  Kanagawa Dragon — color palette
# ---------------------------------------------------------------------------
#   bg        #0d0c0c   sumiInk (dragon variant)
#   fg        #c5c9c5   fujiWhite
#   accent    #7fb4ca   crystalBlue
#   warn      #c4746e   samuraiRed
#   green     #8a9a7b   springGreen
#   violet    #a292a3   oniViolet
#   yellow    #c4b28a   carpYellow
#   bg_dim    #181616   sumiInk1
#   bg_light  #282727   sumiInk3
#   comment   #625e5a   fujiGray

# ---------------------------------------------------------------------------
#  Status bar
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre

# Base colors
set -g status-style "bg=#181616,fg=#c5c9c5"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#0d0c0c,bg=#7fb4ca,bold]  #S #[fg=#7fb4ca,bg=#181616,nobold]"

# Right: date/time and host
set -g status-right-length 60
set -g status-right "#[fg=#282727,bg=#181616]#[fg=#c5c9c5,bg=#282727] %b %d  %H:%M #[fg=#a292a3,bg=#282727]#[fg=#0d0c0c,bg=#a292a3,bold] #h "

# Window status (center)
setw -g window-status-format "#[fg=#625e5a,bg=#181616]  #I:#W  "
setw -g window-status-current-format "#[fg=#181616,bg=#282727]#[fg=#7fb4ca,bg=#282727,bold] #I:#W #[fg=#282727,bg=#181616]"

# Window status separator
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#282727"
set -g pane-active-border-style "fg=#7fb4ca"

# Message / command prompt
set -g message-style "bg=#282727,fg=#c4b28a,bold"
set -g message-command-style "bg=#282727,fg=#c5c9c5"

# Copy mode highlight
setw -g mode-style "bg=#7fb4ca,fg=#0d0c0c"

# Clock
setw -g clock-mode-colour "#7fb4ca"

# Bell
setw -g window-status-bell-style "bg=#c4746e,fg=#0d0c0c,bold"

# ---------------------------------------------------------------------------
#  Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-yank'

# Plugin settings
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-yank: use system clipboard
set -g @yank_selection_mouse 'clipboard'

# ---------------------------------------------------------------------------
#  TPM bootstrap — auto-install if missing
# ---------------------------------------------------------------------------
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

run '~/.tmux/plugins/tpm/tpm'
