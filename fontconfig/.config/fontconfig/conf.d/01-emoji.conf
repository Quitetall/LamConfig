<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!--
    Twemoji emoji fallback.
    DejaVu Sans incorrectly claims emoji codepoints in its charset,
    beating Twemoji in bare fc-match. These rules fix priority.
  -->

  <!-- Prefer Twemoji for the emoji generic family -->
  <alias>
    <family>emoji</family>
    <prefer><family>Twemoji</family></prefer>
  </alias>

  <!-- When IntoneMono (terminal font) is requested, prepend Twemoji
       so it fills emoji glyphs before the font's own charset is used -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>IntoneMono Nerd Font Mono</string>
    </test>
    <edit name="family" mode="prepend">
      <string>Twemoji</string>
    </edit>
  </match>

  <!-- Same for generic monospace (covers most terminals) -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>monospace</string>
    </test>
    <edit name="family" mode="prepend">
      <string>Twemoji</string>
    </edit>
  </match>

  <!-- Same for sans-serif (covers browsers) -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="prepend">
      <string>Twemoji</string>
    </edit>
  </match>

  <!-- Explicitly demote DejaVu Sans for emoji block (U+1F000–U+1FFFF) -->
  <match target="scan">
    <test name="family"><string>DejaVu Sans</string></test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset>
          <!-- Emoticons block: U+1F600–U+1F64F -->
          <int>0x1f600</int><int>0x1f601</int><int>0x1f602</int><int>0x1f603</int>
          <int>0x1f604</int><int>0x1f605</int><int>0x1f606</int><int>0x1f607</int>
          <int>0x1f608</int><int>0x1f609</int><int>0x1f60a</int><int>0x1f60b</int>
          <int>0x1f60c</int><int>0x1f60d</int><int>0x1f60e</int><int>0x1f60f</int>
          <int>0x1f610</int><int>0x1f611</int><int>0x1f612</int><int>0x1f613</int>
          <int>0x1f614</int><int>0x1f615</int><int>0x1f616</int><int>0x1f617</int>
          <int>0x1f618</int><int>0x1f619</int><int>0x1f61a</int><int>0x1f61b</int>
          <int>0x1f61c</int><int>0x1f61d</int><int>0x1f61e</int><int>0x1f61f</int>
          <int>0x1f620</int><int>0x1f621</int><int>0x1f622</int><int>0x1f623</int>
          <int>0x1f624</int><int>0x1f625</int><int>0x1f626</int><int>0x1f627</int>
          <int>0x1f628</int><int>0x1f629</int><int>0x1f62a</int><int>0x1f62b</int>
          <int>0x1f62c</int><int>0x1f62d</int><int>0x1f62e</int><int>0x1f62f</int>
          <int>0x1f630</int><int>0x1f631</int><int>0x1f632</int><int>0x1f633</int>
          <int>0x1f634</int><int>0x1f635</int><int>0x1f636</int><int>0x1f637</int>
          <int>0x1f638</int><int>0x1f639</int><int>0x1f63a</int><int>0x1f63b</int>
          <int>0x1f63c</int><int>0x1f63d</int><int>0x1f63e</int><int>0x1f63f</int>
          <int>0x1f640</int><int>0x1f641</int><int>0x1f642</int><int>0x1f643</int>
          <int>0x1f644</int><int>0x1f645</int><int>0x1f646</int><int>0x1f647</int>
          <int>0x1f648</int><int>0x1f649</int><int>0x1f64a</int><int>0x1f64b</int>
          <int>0x1f64c</int><int>0x1f64d</int><int>0x1f64e</int><int>0x1f64f</int>
          <!-- Misc symbols and pictographs: U+1F900–U+1F9FF -->
          <int>0x1f900</int><int>0x1f910</int><int>0x1f917</int><int>0x1f920</int>
          <int>0x1f930</int><int>0x1f940</int><int>0x1f950</int><int>0x1f960</int>
          <int>0x1f970</int><int>0x1f980</int><int>0x1f990</int><int>0x1f9a0</int>
        </charset>
      </minus>
    </edit>
  </match>

</fontconfig>
